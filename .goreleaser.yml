# GoReleaser config for cross-platform Warden CLI binaries.
# Run `goreleaser release` from a tagged commit (git tag v0.1.0 && git push --tags)
# to publish binaries for Linux, macOS, and Windows to GitHub Releases.
# Not yet run, this config is the mechanism, not a claim that binaries exist yet.
version: 2

builds:
  - id: warden
    main: ./controller/cmd/warden
    binary: warden
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: warden-archive
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: EdwinJdevops
    name: warden
