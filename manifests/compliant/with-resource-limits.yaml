# Compliant baseline: identical workload, resources declared.
# This is what Warden's generated PR should converge legacy-worker
# toward. Used as the assertion target in controller tests.
apiVersion: v1
kind: Pod
metadata:
  name: legacy-worker
  namespace: default
  labels:
    app: legacy-worker
spec:
  containers:
    - name: worker
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
