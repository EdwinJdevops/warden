# Deliberately non-compliant: no resources.requests/limits.
# Used in week-1 kind cluster to prove Kyverno's Audit-mode policy
# flags this, and later to prove Warden generates a correct
# remediation PR against exactly this violation.
apiVersion: v1
kind: Pod
metadata:
  name: legacy-worker
  namespace: default
  labels:
    app: legacy-worker
spec:
  containers:
    - name: worker
      image: busybox:1.36
      command: ["sleep", "3600"]
